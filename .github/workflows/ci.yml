name: CI

on:
  pull_request:
    branches:
      - development
  push:
    branches:
      - development
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_APP_URL: https://basket-places.com
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      GEMINI_API_KEY: ci-placeholder-gemini-key
      RESEND_API_KEY: ci-placeholder-resend-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  tests:
    name: RLS (pgTAP) and E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Los runners de ubuntu ya traen Docker; la CLI de Supabase es devDependency.
      - name: Start Supabase local
        run: npx supabase start

      # ── Fase 2: tests de RLS con pgTAP ──
      - name: Run RLS tests (pgTAP)
        run: npm run test:db

      # ── Fase 1: smoke tests E2E con Playwright (solo Chromium) ──
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Playwright)
        run: npm run test:e2e

      # Evidencia para diagnosticar fallos (traces, screenshots, reporte HTML).
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase local
        if: ${{ always() }}
        run: npx supabase stop --no-backup
